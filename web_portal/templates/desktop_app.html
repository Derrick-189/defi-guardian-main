<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeFi Guardian - Verification Suite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f0f2f5;
            --panel: #ffffff;
            --accent: #0d9488;
            --accent-light: #ccfbf1;
            --text: #1e293b;
            --dim: #64748b;
            --border: #cbd5e1;
            --nav-bg: #1e293b;
            --nav-text: #f1f5f9;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background: var(--nav-bg);
            border-bottom: 1px solid #334155;
            padding: 0.85rem 2rem;
            display: flex;
            align-items: center;
        }
        .navbar-brand {
            color: #2dd4bf !important;
            font-weight: 800;
            font-size: 1.15rem;
            text-decoration: none;
        }
        .nav-btn {
            background: #0d9488;
            color: #fff !important;
            border: none;
            border-radius: 8px;
            padding: 0.45rem 1rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }
        .nav-btn:hover { background: #0f766e; }
        .nav-btn.secondary {
            background: #7c3aed;
        }
        .nav-btn.secondary:hover { background: #6d28d9; }
        .main-container { padding: 2rem; max-width: 1400px; margin: 0 auto; }
        .stat-card {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .stat-icon {
            width: 52px; height: 52px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        .stat-info h3 { margin: 0; font-weight: 800; color: var(--text); font-size: 1.6rem; }
        .stat-info p { margin: 0; color: var(--dim); font-size: 0.85rem; font-weight: 500; }
        .panel {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.07);
        }
        .panel-header {
            padding: 1rem 1.5rem;
            border-bottom: 1px solid var(--border);
            font-weight: 700;
            color: var(--text);
            background: #f8fafc;
            font-size: 0.95rem;
        }
        .panel-body { padding: 1.5rem; }
        .tool-status {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 500;
        }
        .status-dot {
            width: 10px; height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 0.5rem;
        }
        .status-dot.online { background: #16a34a; }
        .status-dot.offline { background: #dc2626; }
        .badge-pass { background: #16a34a; }
        .badge-fail { background: #dc2626; }
        .badge-warn { background: #ca8a04; }
        .text-accent { color: var(--accent); }
        .text-muted { color: var(--dim) !important; }
        .spinner-border { color: var(--accent); }
    </style>
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/">
            <i class="fas fa-shield-halved"></i> DeFi Guardian
        </a>
        <div class="ms-auto d-flex align-items-center gap-2">
            <button onclick="location.reload()" class="nav-btn" title="Reload Dashboard">
                <i class="fas fa-sync-alt"></i>
            </button>
            <a href="/" class="nav-btn">
                <i class="fas fa-chart-line me-1"></i> Dashboard
            </a>
            <button onclick="startPortal()" class="nav-btn secondary" id="portalBtn">
                <i class="fas fa-user-circle me-1"></i> Account Portal
            </button>
            <span class="ms-3 d-none d-md-inline" style="color:#94a3b8; font-size:0.85rem;">
                <i class="fas fa-circle text-success me-1" style="color:#22c55e;"></i> System Online
            </span>
        </div>
    </nav>

    <div class="main-container">
        <!-- Stats Row -->
        <div class="row g-3 mb-4">
            <div class="col-md-3">
                <div class="stat-card" style="border-left: 4px solid #16a34a;">
                    <div class="stat-icon" style="background: #dcfce7; color: #16a34a;">
                        <i class="fas fa-check-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="passedCount">-</h3>
                        <p>Properties Verified</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left: 4px solid #dc2626;">
                    <div class="stat-icon" style="background: #fee2e2; color: #dc2626;">
                        <i class="fas fa-times-circle"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="failedCount">-</h3>
                        <p>Violations Found</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left: 4px solid #0d9488;">
                    <div class="stat-icon" style="background: #ccfbf1; color: #0d9488;">
                        <i class="fas fa-cubes"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="statesExplored">-</h3>
                        <p>States Explored</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card" style="border-left: 4px solid #ca8a04;">
                    <div class="stat-icon" style="background: #fef9c3; color: #ca8a04;">
                        <i class="fas fa-tools"></i>
                    </div>
                    <div class="stat-info">
                        <h3 id="toolsAvailable">-</h3>
                        <p>Tools Available</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tool Status -->
        <div class="panel mb-4">
            <div class="panel-header">
                <i class="fas fa-microchip text-accent me-2"></i> Verification Tools
            </div>
            <div class="panel-body">
                <div class="row" id="toolGrid">
                    <div class="col-12 text-center text-muted py-3">
                        <div class="spinner-border spinner-border-sm me-2"></div>
                        Loading tool status...
                    </div>
                </div>
            </div>
        </div>

        <!-- Recent Activity -->
        <div class="panel">
            <div class="panel-header">
                <i class="fas fa-history text-accent me-2"></i> Recent Verification Activity
            </div>
            <div class="panel-body">
                <div id="activityFeed">
                    <p class="text-muted text-center py-3">
                        <i class="fas fa-inbox me-2"></i> No recent activity
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function startPortal() {
            const btn = document.getElementById('portalBtn');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin me-1"></i> Starting...';
            btn.disabled = true;

            try {
                const resp = await fetch('/api/v1/portal/start?t=' + Date.now());
                const data = await resp.json();
                
                if (data.status === 'already_running' || data.status === 'starting') {
                    // Wait a bit if starting
                    if (data.status === 'starting') {
                        await new Promise(r => setTimeout(r, 2000));
                    }
                    window.open(data.url, '_blank');
                }
            } catch (err) {
                console.error('Failed to start portal:', err);
                alert('Failed to start account portal. Please ensure it is not already running on another port.');
            } finally {
                btn.innerHTML = originalHtml;
                btn.disabled = false;
            }
        }

        async function loadStatus() {
            try {
                const t = Date.now();
                // Load verification state and tool availability in parallel
                const [stateResp, toolResp] = await Promise.all([
                    fetch('/api/v1/state/current?t=' + t),
                    fetch('/api/v1/tools/status?t=' + t)
                ]);

                if (!stateResp.ok || !toolResp.ok) {
                    throw new Error(`HTTP Error: State=${stateResp.status}, Tools=${toolResp.status}`);
                }

                const stateContentType = stateResp.headers.get("content-type");
                if (!stateContentType || !stateContentType.includes("application/json")) {
                    const text = await stateResp.text();
                    console.error("Expected JSON but got:", text.substring(0, 100));
                    throw new Error("API returned non-JSON response (likely a 404 or 500 HTML page)");
                }

                const state = await stateResp.json();
                const tools = await toolResp.json();

                // ── Shared skip-key set ──────────────────────────────────
                const SKIP_KEYS = new Set([
                    'success','datetime','states_stored','transitions','depth',
                    'specs','output','errors','model_name','verified',
                    'ltl_results','errors_count','timestamp', 'active_tool', 'active_status'
                ]);

                // ── Tool availability count ──────────────────────────────
                const toolEntries = Object.entries(tools);
                const availableTools = toolEntries.filter(([, v]) =>
                    v === true || (v && v.installed) || (v && v.status === 'available') || (v && v.status === 'degraded')
                ).length;
                document.getElementById('toolsAvailable').textContent =
                    availableTools > 0 ? `${availableTools}/${toolEntries.length}` : '0/' + toolEntries.length;

                // ── States explored ──────────────────────────────────────
                const statesVal = state.states_stored || state.states || 0;
                document.getElementById('statesExplored').textContent = statesVal.toLocaleString();

                // ── Properties verified / violations ─────────────────────
                const ltlResults = (state.spin && state.spin.ltl_results) || state.ltl_results || [];
                let passed = 0, failed = 0;
                if (Array.isArray(ltlResults) && ltlResults.length > 0) {
                    ltlResults.forEach(r => {
                        if (r.success || r.status === 'PASS' || r.status === 'SUCCESS') passed++; else failed++;
                    });
                } else {
                    // Strategy 2: tool-level pass/fail
                    for (const [key, val] of Object.entries(state)) {
                        if (SKIP_KEYS.has(key)) continue;
                        if (val && typeof val === 'object' && ('success' in val || 'status' in val)) {
                            if (val.success === true  || val.status === 'PASS' || val.status === 'SUCCESS') passed++;
                            else if (val.success === false || val.status === 'FAIL') failed++;
                        }
                    }
                }
                document.getElementById('passedCount').textContent = passed;
                document.getElementById('failedCount').textContent = failed;

                // ── Tool grid ────────────────────────────────────────────
                const toolGrid = document.getElementById('toolGrid');
                const toolNames = new Set(toolEntries.map(([t]) => t.toLowerCase()));

                let gridHtml = toolEntries.map(([tool, v]) => {
                    const available = v === true || (v && v.installed) ||
                                      (v && (v.status === 'available' || v.status === 'degraded'));
                    const toolState = state[tool.toLowerCase()];
                    let badge = '';
                    if (toolState && typeof toolState === 'object' && toolState.status) {
                        const status = (toolState.status || '').toUpperCase();
                        const ok      = status === 'PASS' || status === 'SUCCESS' || toolState.success === true;
                        const running = status === 'RUNNING';
                        const isInfra = status === 'INFRA_ERROR' || toolState.infra_error;
                        
                        const cls  = running ? 'bg-warning text-dark' : (isInfra ? 'badge-warn' : (ok ? 'badge-pass' : 'badge-fail'));
                        const text = running ? 'RUNNING' : (isInfra ? 'CONFIG'     : (ok ? 'PASS'       : 'FAIL'));
                        badge = `<span class="badge ${cls} ms-1" style="font-size:0.7rem;">${text}</span>`;
                    }
                    return `
                    <div class="col-md-4 col-lg-3 mb-2">
                        <div class="tool-status ${available ? '' : 'opacity-50'}">
                            <span class="status-dot ${available ? 'online' : 'offline'}"></span>
                            <strong>${tool.toUpperCase()}</strong>
                            ${badge}
                            <span class="float-end text-muted small">${available ? 'Ready' : 'Missing'}</span>
                        </div>
                    </div>`;
                }).join('');

                toolGrid.innerHTML = gridHtml || '<p class="text-muted text-center">No tool data available</p>';

                // ── Recent activity feed ─────────────────────────────────
                const activityFeed = document.getElementById('activityFeed');
                try {
                    const runsResp = await fetch('/api/v1/desktop-runs?t=' + t);
                    if (!runsResp.ok) throw new Error("Activity feed HTTP " + runsResp.status);
                    
                    const ct = runsResp.headers.get("content-type");
                    if (!ct || !ct.includes("application/json")) throw new Error("Activity feed returned non-JSON");

                    const runs = await runsResp.json();
                    if (Array.isArray(runs) && runs.length > 0) {
                        activityFeed.innerHTML = runs.slice(0, 10).map(r => {
                            const status = (r.status||'').toUpperCase();
                            const ok = ['SUCCESS','PASS','PASSED'].includes(status);
                            const fail = ['FAILED','FAIL','ERROR'].includes(status);
                            const badgeCls = ok ? 'badge-pass' : (fail ? 'badge-fail' : 'badge-warn');
                            
                            return `
                            <div style="display:flex;align-items:center;gap:0.75rem;
                                        padding:0.75rem 0;border-bottom:1px solid var(--border);">
                                <div style="width:10px; height:10px; border-radius:50%; flex-shrink:0; 
                                            background: ${ok ? '#16a34a' : (fail ? '#dc2626' : '#ca8a04')};"></div>
                                <div style="flex:1;min-width:0;">
                                    <div style="font-weight:600;font-size:0.95rem;
                                                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);">
                                        ${r.file}
                                    </div>
                                    <div style="font-size:0.8rem;color:var(--dim);">
                                        <i class="fas fa-microchip me-1"></i> ${r.tool} · <i class="far fa-clock ms-1 me-1"></i> ${r.timestamp}
                                        ${r.states ? ` · <i class="fas fa-cubes ms-1 me-1"></i> ${r.states.toLocaleString()} states` : ''}
                                    </div>
                                </div>
                                <span class="badge ${badgeCls}"
                                      style="font-size:0.72rem;padding:4px 10px;border-radius:6px;
                                             color:#fff;flex-shrink:0; font-weight:700;">
                                    ${status || 'UNKNOWN'}
                                </span>
                            </div>`;
                        }).join('');
                    } else {
                        activityFeed.innerHTML = `
                            <div class="text-center py-5">
                                <i class="fas fa-inbox fa-3x mb-3 text-muted" style="opacity:0.3;"></i>
                                <p class="text-muted">No recent verification activity found.</p>
                                <p class="small text-muted">Run a verification in the desktop app to see results here.</p>
                            </div>`;
                    }
                } catch (err) {
                    console.error('Activity feed error:', err);
                }

            } catch (err) {
                console.error('Failed to load status:', err);
            }
        }
        
        loadStatus();
        // Poll every 3 seconds for more "active" feel
        setInterval(loadStatus, 3000);
    </script>
</body>
</html>
