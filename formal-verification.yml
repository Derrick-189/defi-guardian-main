# .github/workflows/formal-verification.yml
# DeFi Guardian - Automated Formal Verification Pipeline
# Runs on every push and pull request

name: 🛡️ Formal Verification

on:
  push:
    branches: [main, develop]
    paths:
      - 'contracts/**/*.sol'
      - 'contracts/**/*.rs'
      - 'src/**/*.py'
  pull_request:
    branches: [main]
    paths:
      - 'contracts/**/*.sol'
      - 'contracts/**/*.rs'

# Ensure only one verification runs at a time per PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Job 1: SPIN Model Checking (Solidity/Rust -> Promela)
  # ============================================================================
  spin-verification:
    name: 🔄 SPIN Model Checking
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      
      - name: 📦 Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🔧 Install SPIN Model Checker
        run: |
          wget -q https://github.com/nimble-code/Spin/archive/refs/tags/version-6.5.2.tar.gz
          tar -xzf version-6.5.2.tar.gz
          cd Spin-version-6.5.2/Src
          make
          sudo cp spin /usr/local/bin/
          spin -V
      
      - name: 🔍 Find Smart Contracts
        id: find-contracts
        run: |
          echo "solidity_files=$(find contracts -name '*.sol' -type f | wc -l)" >> $GITHUB_OUTPUT
          echo "rust_files=$(find contracts -name '*.rs' -type f | wc -l)" >> $GITHUB_OUTPUT
      
      - name: 📝 Translate and Verify Solidity Contracts
        if: steps.find-contracts.outputs.solidity_files > 0
        run: |
          mkdir -p verification_results/spin
          
          for file in contracts/**/*.sol; do
            if [ -f "$file" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🔍 Verifying: $file"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              # Run DeFi Guardian translator
              python3 -c "
      import sys
      sys.path.insert(0, '.')
      from translator import DeFiTranslator
      
      with open('$file', 'r') as f:
          code = f.read()
      
      pml = DeFiTranslator.translate_solidity(code)
      with open('model.pml', 'w') as f:
          f.write(pml)
      "
              
              # Run SPIN verification
              spin -a model.pml
              gcc -O3 -o pan pan.c
              ./pan -a -m10000 > spin_output.txt 2>&1
              
              # Check result
              if grep -q "errors: 0" spin_output.txt; then
                echo "✅ VERIFICATION PASSED: $file"
                echo "passed" > "verification_results/spin/$(basename $file).status"
              else
                echo "❌ VERIFICATION FAILED: $file"
                echo "failed" > "verification_results/spin/$(basename $file).status"
                cat spin_output.txt
                exit 1
              fi
            fi
          done
      
      - name: 📊 Generate Verification Report
        if: always()
        run: |
          cat > verification_report.md << 'EOF'
      # 🛡️ Formal Verification Report
      
      **Repository:** ${{ github.repository }}
      **Branch:** ${{ github.ref_name }}
      **Commit:** ${{ github.sha }}
      **Triggered by:** ${{ github.actor }}
      **Timestamp:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")
      
      ## SPIN Model Checking Results
      
      | Contract | Status | States | Depth | Time |
      |----------|--------|--------|-------|------|
      EOF
          
          for status_file in verification_results/spin/*.status; do
            if [ -f "$status_file" ]; then
              contract=$(basename "$status_file" .status)
              status=$(cat "$status_file")
              if [ "$status" = "passed" ]; then
                echo "| $contract | ✅ PASS | - | - | - |" >> verification_report.md
              else
                echo "| $contract | ❌ FAIL | - | - | - |" >> verification_report.md
              fi
            fi
          done
          
          echo "" >> verification_report.md
          echo "---" >> verification_report.md
          echo "*Report generated by DeFi Guardian CI Pipeline*" >> verification_report.md
      
      - name: 📤 Upload Verification Report
        uses: actions/upload-artifact@v4
        with:
          name: spin-verification-report
          path: |
            verification_report.md
            verification_results/
            model.pml
      
      - name: 💬 Comment PR with Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('verification_report.md', 'utf8');
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report
            });

  # ============================================================================
  # Job 2: Kani Rust Verification (for Rust contracts)
  # ============================================================================
  kani-verification:
    name: 🦀 Kani Rust Verification
    runs-on: ubuntu-latest
    needs: []  # Run in parallel with SPIN
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🦀 Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true
      
      - name: 📦 Install Kani
        run: |
          cargo install --locked kani-verifier
          cargo kani setup
      
      - name: 🔍 Verify Rust Contracts with Kani
        run: |
          mkdir -p verification_results/kani
          
          for file in contracts/**/*.rs; do
            if [ -f "$file" ]; then
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              echo "🦀 Kani Verification: $file"
              echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
              
              # Create temporary Cargo project
              TEMP_DIR=$(mktemp -d)
              mkdir -p "$TEMP_DIR/src"
              cp "$file" "$TEMP_DIR/src/lib.rs"
              
              cat > "$TEMP_DIR/Cargo.toml" << EOF
      [package]
      name = "kani_verify"
      version = "0.1.0"
      edition = "2021"
      EOF
              
              cd "$TEMP_DIR"
              cargo kani --enable-unstable --concrete-playback=print > kani_output.txt 2>&1
              
              if grep -q "VERIFICATION SUCCESSFUL" kani_output.txt; then
                echo "✅ KANI PASSED: $file"
              else
                echo "❌ KANI FAILED: $file"
                cat kani_output.txt
              fi
              
              cd -
            fi
          done
      
      - name: 📤 Upload Kani Results
        uses: actions/upload-artifact@v4
        with:
          name: kani-verification-results
          path: verification_results/kani/

  # ============================================================================
  # Job 3: LTL Property Validation
  # ============================================================================
  ltl-validation:
    name: 📋 LTL Property Check
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
      
      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: 🔍 Validate LTL Properties
        run: |
          python3 -c "
      import re
      import sys
      
      # Define required LTL properties for DeFi contracts
      REQUIRED_PROPERTIES = {
          'safety_no_overflow': r'\[\]\s*\(.*>=.*0.*\)',
          'safety_reentrancy': r'\[\]\s*!.*lock',
          'invariant_collateral': r'\[\]\s*\(.*collateral.*>=.*debt.*\)',
          'liveness_progress': r'<>\s*\(.*state.*==.*2.*\)',
      }
      
      print('🔍 Validating LTL Property Generation...')
      print('=' * 60)
      
      # This would actually run the translator and check output
      # For now, we verify the translator module exists and has required methods
      
      try:
          from translator import DeFiTranslator
          
          # Check that LTL generation methods exist
          assert hasattr(DeFiTranslator, 'generate_ltl_properties')
          assert hasattr(DeFiTranslator, 'generate_ltl_properties_advanced')
          
          print('✅ Translator module loaded successfully')
          print('✅ LTL property generation methods found')
          
          # Test with sample contract
          sample = '''
          contract Lending {
              uint256 public collateral;
              uint256 public debt;
              function borrow(uint256 amount) public {
                  require(collateral >= debt + amount);
                  debt += amount;
              }
          }
          '''
          
          pml = DeFiTranslator.translate_solidity(sample)
          
          for prop_name, pattern in REQUIRED_PROPERTIES.items():
              if re.search(pattern, pml):
                  print(f'✅ Property generated: {prop_name}')
              else:
                  print(f'⚠️ Property not found: {prop_name}')
          
      except Exception as e:
          print(f'❌ Validation failed: {e}')
          sys.exit(1)
      "