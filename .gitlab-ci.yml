# .gitlab-ci.yml
# DeFi Guardian - GitLab CI Pipeline for Formal Verification

stages:
  - verify
  - report
  - dashboard

variables:
  DEFI_GUARDIAN_VERSION: "1.0.0"

# ============================================================================
# Stage 1: Verification
# ============================================================================

.spin-template: &spin-verification
  stage: verify
  before_script:
    - apt-get update && apt-get install -y gcc make wget python3 python3-pip
    - pip3 install --upgrade pip
    - pip3 install -r requirements.txt
    - wget -q https://github.com/nimble-code/Spin/archive/version-6.5.2.tar.gz
    - tar -xzf version-6.5.2.tar.gz
    - cd Spin-version-6.5.2/Src && make && cp spin /usr/local/bin/
    - spin -V
  script:
    - |
      for file in contracts/*.sol contracts/*.rs; do
        if [ -f "$file" ]; then
          echo "🔍 Verifying: $file"
          python3 -c "
import sys
sys.path.insert(0, '.')
from translator import DeFiTranslator
with open('$file', 'r') as f:
    code = f.read()
pml = DeFiTranslator.translate_solidity(code) if '$file'.endswith('.sol') else DeFiTranslator.translate_rust(code)
with open('model.pml', 'w') as f:
    f.write(pml)
"
          spin -a model.pml && gcc -o pan pan.c && ./pan -a -N safety_reentrancy
        fi
      done
  artifacts:
    when: always
    paths:
      - model.pml
      - verification_results/
    reports:
      junit: verification_results/junit.xml

spin-solidity:
  <<: *spin-verification
  only:
    changes:
      - contracts/**/*.sol

spin-rust:
  <<: *spin-verification
  only:
    changes:
      - contracts/**/*.rs

# ============================================================================
# Stage 2: Report Generation
# ============================================================================

generate-report:
  stage: report
  script:
    - |
      cat > verification_report.md << EOF
      # 🛡️ Formal Verification Report
      
      **Pipeline:** $CI_PIPELINE_ID
      **Commit:** $CI_COMMIT_SHORT_SHA
      **Branch:** $CI_COMMIT_REF_NAME
      **Date:** $(date)
      
      ## Results
      
      $(if [ -f verification_results/passed ]; then echo "✅ All verifications passed"; else echo "❌ Some verifications failed"; fi)
      EOF
  artifacts:
    paths:
      - verification_report.md

# ============================================================================
# Stage 3: Dashboard Update
# ============================================================================

update-dashboard:
  stage: dashboard
  script:
    - echo "Updating verification dashboard..."
    - python3 -c "from verification_state import VerificationState; VerificationState.save_result(True, 'CI Pipeline', '', 'ci-verification')"
  only:
    - main
    - develop